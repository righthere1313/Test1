<!DOCTYPE html>
<html lang="zh-CN">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<title>数字人演示</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			user-select: none;
		}

		html, body {
			height: 100vh;
			overflow: hidden;
		}

		body {
			background: #fff;
			font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
			padding: 20px;
			display: flex;
			justify-content: center;
			align-items: center;
		}

		.demo-card {
			background: #fff;
			border: 2px solid #1a1a1a;
			width: 100%;
			max-width: 1000px;
			height: calc(100vh - 40px);
			display: flex;
			flex-direction: column;
		}

		.demo-header {
			padding: 20px 24px;
			background: #bdd6cd;
			border-bottom: 2px solid #1a1a1a;
			flex-shrink: 0;
		}

		.demo-header h2 {
			font-size: 24px;
			font-weight: 800;
			color: #1a1a1a;
			display: flex;
			align-items: center;
			gap: 12px;
		}

		.demo-header p {
			font-size: 14px;
			color: #1a1a1a;
			margin-top: 6px;
			font-weight: 600;
		}

		.demo-content {
			padding: 24px;
			flex: 1;
			display: flex;
			align-items: center;
			justify-content: center;
			overflow: hidden;
		}

		.video-area {
			width: 100%;
			max-width: 800px;
			aspect-ratio: 16 / 9;
			background: #1a1a1a;
			border: 2px solid #1a1a1a;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			gap: 12px;
		}

		.video-placeholder-text {
			font-size: 24px;
			font-weight: 700;
			color: #fff;
		}

		.video-placeholder-sub {
			font-size: 16px;
			color: #999;
		}

		@media (max-width: 768px) {
			body {
				padding: 10px;
			}

			.demo-card {
				height: calc(100vh - 20px);
			}

			.demo-content {
				padding: 16px;
			}

			.video-placeholder-text {
				font-size: 18px;
			}

			.video-placeholder-sub {
				font-size: 14px;
			}
		}
	</style>
</head>

<body>
	<div class="demo-card">
		<div class="demo-header">
			<h2>数字人演示</h2>
			<p>AI数字人互动展示页面</p>
		</div>
		<div class="demo-content">
			<div class="video-area">
				<div class="video-placeholder-text">视频播放区域</div>
				<div class="video-placeholder-sub">可放置数字人演示视频</div>
			</div>
		</div>
	</div>
</body>

</html>
