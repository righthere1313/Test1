<!DOCTYPE html>
<html lang="zh-CN">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<title>翻牌猜谜 · 术语卡</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			user-select: none;
		}

		html, body {
			height: 100vh;
			overflow: hidden;
		}

		body {
			background: #fff;
			font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
			padding: 20px;
			display: flex;
			justify-content: center;
			align-items: center;
		}

		.game-card {
			background: #fff;
			border: 2px solid #1a1a1a;
			width: 100%;
			max-width: 1000px;
			height: calc(100vh - 40px);
			display: flex;
			flex-direction: column;
		}

		.game-header {
			padding: 16px 24px;
			background: #bdd6cd;
			border-bottom: 2px solid #1a1a1a;
			flex-shrink: 0;
		}

		.game-header h2 {
			font-size: 22px;
			font-weight: 800;
			color: #1a1a1a;
			display: flex;
			align-items: center;
			gap: 10px;
		}

		.game-header p {
			font-size: 13px;
			color: #1a1a1a;
			margin-top: 3px;
			font-weight: 600;
		}

		.game-content {
			padding: 16px 24px;
			flex: 1;
			display: flex;
			flex-direction: column;
			overflow: hidden;
		}

		.memory-stats {
			display: flex;
			justify-content: space-between;
			align-items: baseline;
			margin-bottom: 12px;
			font-size: 15px;
			font-weight: 700;
			color: #1a1a1a;
		}

		.reset-memory {
			background: #1a1a1a;
			border: 2px solid #1a1a1a;
			padding: 8px 18px;
			font-weight: 700;
			font-size: 14px;
			cursor: pointer;
			transition: all 0.15s;
			color: #fff;
		}

		.reset-memory:hover {
			background: #333;
		}

		.cards-grid {
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			gap: 12px;
			flex: 1;
			align-content: center;
			min-height: 0;
		}

		.card {
			aspect-ratio: 4 / 3;
			background: #f0f0f0;
			border: 2px solid #1a1a1a;
			display: flex;
			align-items: center;
			justify-content: center;
			text-align: center;
			font-weight: 700;
			cursor: pointer;
			transition: all 0.15s;
			font-size: 14px;
			padding: 10px;
			word-break: break-word;
			overflow: hidden;
			line-height: 1.4;
		}

		.card:hover:not(.flipped) {
			background: #bdd6cd;
		}

		.card.flipped {
			background: #bdd6cd;
			color: #1a1a1a;
			border: 2px solid #1a1a1a;
			font-weight: 700;
		}

		.card.back {
			background: #f0f0f0;
			color: #1a1a1a;
			border: 2px solid #1a1a1a;
			font-weight: 800;
		}

		.feedback-area {
			background: #f0f0f0;
			padding: 10px 18px;
			font-size: 14px;
			font-weight: 600;
			color: #1a1a1a;
			border: 2px solid #1a1a1a;
			margin-top: 12px;
			flex-shrink: 0;
		}

		@media (max-width: 768px) {
			body {
				padding: 10px;
			}

			.game-card {
				height: calc(100vh - 20px);
			}

			.game-content {
				padding: 16px;
			}

			.cards-grid {
				gap: 8px;
			}

			.card {
				font-size: 12px;
				padding: 8px;
			}
		}
	</style>
</head>

<body>
	<div class="game-card">
		<div class="game-header">
			<h2>翻牌猜谜 · 术语卡</h2>
			<p>点击卡片查看术语解释，记住AI知识点</p>
		</div>
		<div class="game-content">
			<div class="memory-stats">
				<span>已翻开: <strong id="flippedCount">0</strong> / <span id="totalCardsSpan">9</span></span>
				<span class="reset-memory" id="resetMemoryBtn">洗牌重置</span>
			</div>
			<div class="cards-grid" id="cardsGrid"></div>
			<div class="feedback-area" id="memoryHint">点击卡片查看术语解释</div>
		</div>
	</div>

	<script>
		const cardData = [
			{ term: "属于人工智能", definition: "让机器模拟人类智能的科学" },
			{ term: "属于机器学习", definition: "通过数据训练模型，让计算机自动学习" },
			{ term: "属于深度学习", definition: "使用多层神经网络进行学习的技术" },
			{ term: "属于计算机视觉", definition: "让计算机看懂图像/视频的技术" },
			{ term: "属于自然语言处理", definition: "让计算机理解人类语言 (NLP)" },
			{ term: "属于大语言模型", definition: "能够生成文本的AI模型" },
			{ term: "属于神经网络", definition: "模仿人脑神经元结构的计算模型" },
			{ term: "属于训练数据", definition: "用于训练AI模型的数据集" },
			{ term: "属于专家系统", definition: "基于知识库进行推理的AI系统" }
		];

		let cards = [];
		let cardElementsMap = new Map();
		let flippedCount = 0;
		let totalCards = cardData.length;

		const cardsGrid = document.getElementById("cardsGrid");
		const flippedCountSpan = document.getElementById("flippedCount");
		const totalCardsSpan = document.getElementById("totalCardsSpan");
		const resetMemoryBtn = document.getElementById("resetMemoryBtn");
		const memoryHintDiv = document.getElementById("memoryHint");

		function shuffleArray(arr) {
			for (let i = arr.length - 1; i > 0; i--) {
				const j = Math.floor(Math.random() * (i + 1));
				[arr[i], arr[j]] = [arr[j], arr[i]];
			}
			return arr;
		}

		function buildCards() {
			const newCards = [];
			for (let i = 0; i < cardData.length; i++) {
				newCards.push({
					id: `card-${i}`,
					term: cardData[i].term,
					definition: cardData[i].definition,
					isFlipped: false
				});
			}
			return shuffleArray(newCards);
		}

		function updateStats() {
			flippedCountSpan.innerText = flippedCount;
			totalCardsSpan.innerText = totalCards;
			if (flippedCount === totalCards) {
				memoryHintDiv.innerHTML = "🎉 恭喜！你已经看完了所有术语解释";
			} else {
				memoryHintDiv.innerHTML = "继续点击卡片查看更多术语解释";
			}
		}

		function renderBoard(cardsArray) {
			cardsGrid.innerHTML = "";
			cardElementsMap.clear();
			cardsArray.forEach((card, idx) => {
				const cardDiv = document.createElement("div");
				cardDiv.className = "card back";
				cardDiv.innerText = card.term;
				cardDiv.setAttribute("data-id", card.id);
				cardDiv.addEventListener("click", () => handleCardClick(card.id));
				cardsGrid.appendChild(cardDiv);
				cardElementsMap.set(card.id, { element: cardDiv, index: idx, cardRef: card });
			});
		}

		function updateSingleCardUI(cardId) {
			const cardObj = cards.find(c => c.id === cardId);
			if (!cardObj) return;
			const mapObj = cardElementsMap.get(cardId);
			if (!mapObj || !mapObj.element) return;
			const el = mapObj.element;
			if (cardObj.isFlipped) {
				el.classList.remove("back");
				el.classList.add("flipped");
				el.innerText = cardObj.definition;
			} else {
				el.classList.remove("flipped");
				el.classList.add("back");
				el.innerText = cardObj.term;
			}
		}

		function handleCardClick(cardId) {
			const cardObj = cards.find(c => c.id === cardId);
			if (!cardObj || cardObj.isFlipped) return;

			cardObj.isFlipped = true;
			flippedCount++;
			updateSingleCardUI(cardId);
			updateStats();
		}

		function resetGame() {
			flippedCount = 0;
			cards = buildCards();
			cards.forEach(card => {
				card.isFlipped = false;
			});
			updateStats();
			renderBoard(cards);
			memoryHintDiv.innerHTML = "卡片已重置，点击查看术语解释";
		}

		function initGame() {
			cards = buildCards();
			flippedCount = 0;
			updateStats();
			renderBoard(cards);
			resetMemoryBtn.onclick = () => resetGame();
		}

		initGame();
	</script>
</body>

</html>
