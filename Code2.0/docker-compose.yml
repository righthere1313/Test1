version: "3.8"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MYSQL_SERVER=db
      - MYSQL_USER=user
      - MYSQL_PASSWORD=password
      - MYSQL_DB=teaching_agent
      - CHROMA_USE_SERVER=true
      - CHROMA_SERVER_HOST=chroma
      - CHROMA_SERVER_PORT=8000
    depends_on:
      - db
      - chroma
    volumes:
      - .:/app
      - ../ppt模版:/app/ppt模版

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: teaching_agent
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  db_data:
  chroma_data:
